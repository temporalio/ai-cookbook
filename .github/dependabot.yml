version: 2
updates:
  - package-ecosystem: "uv"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      python-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
