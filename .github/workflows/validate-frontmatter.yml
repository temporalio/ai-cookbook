name: Validate Recipe Front Matter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - '**/README.md'
      - '.github/scripts/**'
      - 'toolkit/skills/recipe-writing/references/tags.json'
      - '.github/workflows/validate-frontmatter.yml'

concurrency:
  group: validate-frontmatter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Check Recipe Front Matter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ai-cookbook repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install validator dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Run validator unit tests
        working-directory: .github/scripts
        run: npm test

      - name: Validate front matter in recipe READMEs
        run: node .github/scripts/validate-frontmatter.js

      - name: Report result
        if: success()
        run: |
          echo "✅ No docs-breaking front matter errors."
          echo ""
          echo "Hard errors (missing description, missing H1, invalid YAML) fail this job."
          echo "Consistency issues (tag vocabulary, spacing, ordering, priority) are reported"
          echo "as warnings and do not block — the recipe-writing skill is the enforcer."
