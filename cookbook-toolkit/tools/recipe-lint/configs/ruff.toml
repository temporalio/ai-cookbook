# ABOUTME: Toolkit-standard ruff config recipe-lint applies when checking a recipe.
# Mirrors the python skill defaults; target-version py310 since recipes support 3.10+.

line-length = 120
target-version = "py310"

[lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[lint.isort]
# Recipes are flat packages: the recipe's own modules are first-party, not
# third-party. Keep this in sync with the optional directories in layout.md.
known-first-party = [
    "activities",
    "workflows",
    "worker",
    "codec",
    "models",
    "tools",
    "helpers",
    "agents",
    "util",
    "shared",
    "mcp_servers",
]
